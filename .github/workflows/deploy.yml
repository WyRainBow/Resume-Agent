name: 部署到生产服务器

# 合并 / 推送到 main 时自动部署；也可在 Actions 页面手动触发（workflow_dispatch）
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署在跑，避免两次部署互相打断（不取消正在进行的，排队执行）
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}        # SSH 端口非 22 才需配此 secret；为空时用默认 22
          script_stop: true                     # 任一命令失败立即中止，避免「半部署」
          script: |
            set -euo pipefail

            # 非交互式 SSH 默认不加载 nvm，需显式把 node 20 加入 PATH（与 pm2/resume-web 用的版本一致）
            export PATH="/www/server/nvm/versions/node/v20.20.2/bin:$PATH"

            cd /www/wwwroot/Resume-Agent

            # 1) 对齐远程 main（服务器本地改动会被丢弃；.env 等被 .gitignore 忽略的文件不受影响）
            git fetch origin main
            git reset --hard origin/main

            # 2) 后端依赖（venv 与 pm2 的 uvicorn 同一环境；已满足则快速跳过）
            venv/bin/pip install -r requirements.txt

            # 3) 构建前端（Vite 静态产物）
            cd frontend
            npm install
            npm run build
            cd ..

            # 4) 构建 web（resume-web 跑的是 next start 生产模式，必须先 next build 才会用新代码）
            cd web
            npm install
            npm run build
            cd ..

            # 5) 重启 pm2（resume-backend + resume-web），--update-env 让新环境变量生效
            pm2 restart all --update-env
