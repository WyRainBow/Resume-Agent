<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode 刷题周报</title>
  <style>
    :root {
      --bg: #f4efe7;
      --paper: rgba(255, 255, 255, 0.88);
      --paper-strong: #ffffff;
      --ink: #1f1a17;
      --muted: #6f655d;
      --line: rgba(63, 47, 39, 0.12);
      --accent: #bc5b35;
      --accent-soft: rgba(188, 91, 53, 0.12);
      --easy: #2d8f5b;
      --easy-soft: rgba(45, 143, 91, 0.12);
      --medium: #c07a17;
      --medium-soft: rgba(192, 122, 23, 0.14);
      --hard: #b33a3a;
      --hard-soft: rgba(179, 58, 58, 0.12);
      --shadow: 0 24px 60px rgba(63, 47, 39, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "SF Pro SC", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(188, 91, 53, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(192, 122, 23, 0.12), transparent 26%),
        linear-gradient(180deg, #f8f2eb 0%, #f2ece4 100%);
      min-height: 100vh;
      padding: 32px 20px 60px;
    }

    .report {
      max-width: 1240px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 40px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(38, 31, 27, 0.96), rgba(68, 43, 31, 0.92)),
        #221b18;
      color: #f8f3ee;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -80px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 202, 145, 0.22), transparent 68%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: rgba(248, 243, 238, 0.68);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 640px;
      color: rgba(248, 243, 238, 0.82);
      font-size: 16px;
      line-height: 1.7;
    }

    .period {
      min-width: 220px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
    }

    .period-label {
      margin: 0 0 8px;
      font-size: 12px;
      color: rgba(248, 243, 238, 0.65);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .period strong {
      display: block;
      font-size: 22px;
      line-height: 1.35;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 30px;
    }

    .stat {
      padding: 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-label {
      margin: 0 0 8px;
      font-size: 13px;
      color: rgba(248, 243, 238, 0.68);
    }

    .stat-value {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.7fr 0.9fr;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-body {
      padding: 28px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .section-head .section-title {
      margin: 0;
    }

    .filters {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    .filter-field {
      display: grid;
      gap: 6px;
    }

    .filter-field label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .filter-field input {
      min-width: 150px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: inherit;
    }

    .filter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease, background 180ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: var(--accent);
      color: #fff7f1;
    }

    .button-secondary {
      background: rgba(63, 47, 39, 0.08);
      color: var(--ink);
    }

    .days {
      display: grid;
      gap: 18px;
    }

    .day-card {
      padding: 22px;
      background: var(--paper-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .day-date {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .day-count {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .problem-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .problem-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: #fbf8f4;
      border: 1px solid rgba(63, 47, 39, 0.08);
    }

    .problem-name {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
    }

    .tag {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .easy {
      color: var(--easy);
      background: var(--easy-soft);
    }

    .medium {
      color: var(--medium);
      background: var(--medium-soft);
    }

    .hard {
      color: var(--hard);
      background: var(--hard-soft);
    }

    .aside-grid {
      display: grid;
      gap: 18px;
    }

    .summary-card {
      padding: 22px;
      border-radius: var(--radius-lg);
      background: var(--paper-strong);
      border: 1px solid var(--line);
    }

    .summary-card h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .mix {
      display: grid;
      gap: 12px;
    }

    .mix-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .mix-track {
      height: 10px;
      border-radius: 999px;
      background: #eee3d8;
      overflow: hidden;
    }

    .mix-fill {
      height: 100%;
      border-radius: inherit;
    }

    .insight-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .insight-list li {
      color: var(--muted);
      line-height: 1.7;
    }

    .empty-state {
      padding: 28px 22px;
      text-align: center;
      color: var(--muted);
      background: #fbf8f4;
      border-radius: var(--radius-lg);
      border: 1px dashed rgba(63, 47, 39, 0.18);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 18px 14px 40px;
      }

      .hero {
        padding: 28px 22px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel-body {
        padding: 20px;
      }

      .filters,
      .filter-actions {
        width: 100%;
      }

      .filter-field,
      .filter-field input,
      .button {
        width: 100%;
      }

      .problem-item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="report">
    <section class="hero">
      <div class="hero-top">
        <div>
          <p class="eyebrow">LeetCode Weekly Brief</p>
          <h1>刷题周报</h1>
          <p class="subtitle">
            页面只整理最近七天的数据、支持按起止日期筛选、并同步刷新题目卡片、难度分布和每日节奏。
          </p>
        </div>
        <div class="period">
          <p class="period-label">统计周期</p>
          <strong id="period-range">2026-05-04<br />至 2026-05-10</strong>
        </div>
      </div>

      <div class="stats">
        <article class="stat">
          <p class="stat-label">筛选题目数</p>
          <p class="stat-value" id="stat-total">30</p>
        </article>
        <article class="stat">
          <p class="stat-label">活跃天数</p>
          <p class="stat-value" id="stat-active">5 / 7</p>
        </article>
        <article class="stat">
          <p class="stat-label">中等题占比</p>
          <p class="stat-value" id="stat-medium">70%</p>
        </article>
        <article class="stat">
          <p class="stat-label">最高单日题量</p>
          <p class="stat-value" id="stat-peak">9</p>
        </article>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-body">
          <div class="section-head">
            <h2 class="section-title">按天回顾</h2>
            <div class="filters">
              <div class="filter-field">
                <label for="start-date">开始日期</label>
                <input id="start-date" type="date" />
              </div>
              <div class="filter-field">
                <label for="end-date">结束日期</label>
                <input id="end-date" type="date" />
              </div>
              <div class="filter-actions">
                <button id="apply-filter" class="button button-primary" type="button">应用筛选</button>
                <button id="reset-filter" class="button button-secondary" type="button">重置最近七天</button>
              </div>
            </div>
          </div>
          <div class="days" id="days-container"></div>
        </div>
      </div>

      <aside class="aside-grid">
        <section class="panel">
          <div class="panel-body">
            <h2 class="section-title">难度分布</h2>
            <div class="summary-card">
              <div class="mix" id="difficulty-mix"></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-body">
            <h2 class="section-title">节奏概览</h2>
            <div class="summary-card">
              <h3>每日题量</h3>
              <ul class="insight-list" id="daily-volume"></ul>
            </div>
          </div>
        </section>
      </aside>
    </section>

    <p class="footer-note">Generated for elastic-currankuu · LeetCode 最近七天刷题看板</p>
  </main>
  <script>
    const reportData = [
      { date: "2026-05-10", problems: [{ name: "56. 合并区间", difficulty: "中等" }] },
      { date: "2026-05-09", problems: [
        { name: "103. 二叉树的锯齿形层序遍历", difficulty: "中等" },
        { name: "15. 三数之和", difficulty: "中等" },
        { name: "1. 两数之和", difficulty: "简单" }
      ] },
      { date: "2026-05-08", problems: [
        { name: "47. 全排列 II", difficulty: "中等" },
        { name: "46. 全排列", difficulty: "中等" },
        { name: "112. 路径总和", difficulty: "简单" },
        { name: "113. 路径总和 II", difficulty: "中等" },
        { name: "128. 最长连续序列", difficulty: "中等" },
        { name: "543. 二叉树的直径", difficulty: "简单" },
        { name: "124. 二叉树中的最大路径和", difficulty: "困难" },
        { name: "104. 二叉树的最大深度", difficulty: "简单" }
      ] },
      { date: "2026-05-07", problems: [
        { name: "199. 二叉树的右视图", difficulty: "中等" },
        { name: "674. 最长连续递增序列", difficulty: "简单" },
        { name: "2007. 从双倍数组中还原原数组", difficulty: "中等" },
        { name: "217. 存在重复元素", difficulty: "简单" },
        { name: "22. 括号生成", difficulty: "中等" },
        { name: "144. 二叉树的前序遍历", difficulty: "简单" },
        { name: "94. 二叉树的中序遍历", difficulty: "简单" },
        { name: "213. 打家劫舍 II", difficulty: "中等" },
        { name: "49. 字母异位词分组", difficulty: "中等" }
      ] },
      { date: "2026-05-06", problems: [
        { name: "LCR 090. 打家劫舍 II", difficulty: "中等" },
        { name: "LCR 089. 打家劫舍", difficulty: "中等" },
        { name: "236. 二叉树的最近公共祖先", difficulty: "中等" },
        { name: "53. 最大子数组和", difficulty: "中等" },
        { name: "560. 和为 K 的子数组", difficulty: "中等" },
        { name: "102. 二叉树的层序遍历", difficulty: "中等" },
        { name: "3. 无重复字符的最长子串", difficulty: "中等" },
        { name: "LCR 060. 前 K 个高频元素", difficulty: "中等" },
        { name: "2487. 从链表中移除节点", difficulty: "中等" }
      ] },
      { date: "2026-05-05", problems: [] },
      { date: "2026-05-04", problems: [] }
    ];

    const difficultyConfig = {
      "简单": { className: "easy" },
      "中等": { className: "medium" },
      "困难": { className: "hard" }
    };

    const startInput = document.getElementById("start-date");
    const endInput = document.getElementById("end-date");
    const applyButton = document.getElementById("apply-filter");
    const resetButton = document.getElementById("reset-filter");

    const periodRange = document.getElementById("period-range");
    const statTotal = document.getElementById("stat-total");
    const statActive = document.getElementById("stat-active");
    const statMedium = document.getElementById("stat-medium");
    const statPeak = document.getElementById("stat-peak");
    const daysContainer = document.getElementById("days-container");
    const difficultyMix = document.getElementById("difficulty-mix");
    const dailyVolume = document.getElementById("daily-volume");

    const defaultRange = {
      start: reportData[reportData.length - 1].date,
      end: reportData[0].date
    };

    function dateLabel(date) {
      return date;
    }

    function filterData(start, end) {
      return [...reportData]
        .filter((day) => day.date >= start && day.date <= end)
        .sort((a, b) => (a.date < b.date ? 1 : -1));
    }

    function renderDays(days) {
      if (!days.length) {
        daysContainer.innerHTML = '<div class="empty-state">当前筛选范围内没有可显示的数据。</div>';
        return;
      }

      daysContainer.innerHTML = days.map((day) => {
        const problemsHtml = day.problems.length
          ? day.problems.map((problem) => {
              const className = difficultyConfig[problem.difficulty]?.className || "";
              return `
                <li class="problem-item">
                  <p class="problem-name">${problem.name}</p>
                  <span class="tag ${className}">${problem.difficulty}</span>
                </li>
              `;
            }).join("")
          : `
            <li class="problem-item">
              <p class="problem-name">当日无新增题目记录</p>
              <span class="tag" style="color: var(--muted); background: rgba(63, 47, 39, 0.08);">空白日</span>
            </li>
          `;

        return `
          <article class="day-card">
            <div class="day-head">
              <h3 class="day-date">${dateLabel(day.date)}</h3>
              <p class="day-count">${day.problems.length} 题</p>
            </div>
            <ul class="problem-list">${problemsHtml}</ul>
          </article>
        `;
      }).join("");
    }

    function renderDifficulty(days) {
      const totalProblems = days.reduce((sum, day) => sum + day.problems.length, 0);
      const counts = { "简单": 0, "中等": 0, "困难": 0 };

      days.forEach((day) => {
        day.problems.forEach((problem) => {
          counts[problem.difficulty] += 1;
        });
      });

      difficultyMix.innerHTML = Object.entries(counts).map(([name, count]) => {
        const className = difficultyConfig[name].className;
        const width = totalProblems ? (count / totalProblems) * 100 : 0;
        return `
          <div class="mix-row">
            <span class="tag ${className}">${name}</span>
            <div class="mix-track"><div class="mix-fill" style="width: ${width}%; background: var(--${className});"></div></div>
            <strong>${count}</strong>
          </div>
        `;
      }).join("");

      const mediumRatio = totalProblems ? `${Math.round((counts["中等"] / totalProblems) * 100)}%` : "0%";
      statMedium.textContent = mediumRatio;
    }

    function renderDailyVolume(days) {
      dailyVolume.innerHTML = days.map((day) => (
        `<li>${day.date.slice(5)}：${day.problems.length} 题</li>`
      )).join("");
    }

    function renderStats(days, start, end) {
      const totalProblems = days.reduce((sum, day) => sum + day.problems.length, 0);
      const activeDays = days.filter((day) => day.problems.length > 0).length;
      const peak = days.reduce((max, day) => Math.max(max, day.problems.length), 0);

      periodRange.innerHTML = `${start}<br />至 ${end}`;
      statTotal.textContent = totalProblems;
      statActive.textContent = `${activeDays} / ${days.length}`;
      statPeak.textContent = peak;
    }

    function renderRange(start, end) {
      const days = filterData(start, end);
      renderDays(days);
      renderDifficulty(days);
      renderDailyVolume(days);
      renderStats(days, start, end);
    }

    function applyRange() {
      const start = startInput.value || defaultRange.start;
      const end = endInput.value || defaultRange.end;

      if (start > end) {
        alert("开始日期不能晚于结束日期。");
        return;
      }

      renderRange(start, end);
    }

    startInput.min = defaultRange.start;
    startInput.max = defaultRange.end;
    endInput.min = defaultRange.start;
    endInput.max = defaultRange.end;
    startInput.value = defaultRange.start;
    endInput.value = defaultRange.end;

    applyButton.addEventListener("click", applyRange);
    resetButton.addEventListener("click", () => {
      startInput.value = defaultRange.start;
      endInput.value = defaultRange.end;
      renderRange(defaultRange.start, defaultRange.end);
    });

    renderRange(defaultRange.start, defaultRange.end);
  </script>
</body>
</html>
